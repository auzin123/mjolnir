name: Build Mjolnir

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package
      - uses: actions/upload-artifact@v4
        with:
          name: Mjolnir
          path: target/Mjolnir.jar
